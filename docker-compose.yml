services:
  web:
    build: .
    container_name: bob-demo-app
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - FLASK_ENV=production
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')",
        ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

